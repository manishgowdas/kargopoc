name: Kargo PoC on kind
on:
  workflow_dispatch:
jobs:
  kargo-poc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Create kind cluster
        run: |
          kind create cluster --name kargo-demo
      - name: Verify cluster
        run: kubectl get nodes
      # -----------------------------
      # Install Argo CD
      # -----------------------------
      - name: Install Argo CD (core only - FIXED)
        run: |
          kubectl create namespace argocd || true
          kubectl apply -n argocd --server-side \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/core-install.yaml
      - name: Wait for Argo CD
        run: |
          sleep 30
          kubectl rollout status deployment/argocd-redis -n argocd --timeout=300s
          kubectl rollout status deployment/argocd-repo-server -n argocd --timeout=300s
          kubectl rollout status deployment/argocd-applicationset-controller -n argocd --timeout=300s
          kubectl rollout status statefulset/argocd-application-controller -n argocd --timeout=300s
      - name: Verify Argo CD
        run: kubectl get pods -n argocd
      # -----------------------------
      # Install cert-manager
      # -----------------------------
      - name: Install cert-manager
        run: |
          kubectl apply --server-side \
            -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
      - name: Wait for cert-manager
        run: |
          sleep 30
          kubectl rollout status deployment/cert-manager -n cert-manager --timeout=300s
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=300s
          kubectl rollout status deployment/cert-manager-cainjector -n cert-manager --timeout=300s
      # -----------------------------
      # Install Kargo
      # -----------------------------
      - name: Install Kargo
        run: |
          sudo apt-get install -y apache2-utils
          ADMIN_PASSWORD_HASH=$(htpasswd -bnBC 10 "" "admin" | tr -d ':\n')
          SIGNING_KEY=$(openssl rand -base64 32)
          helm install kargo \
            oci://ghcr.io/akuity/kargo-charts/kargo \
            --namespace kargo \
            --create-namespace \
            --set api.adminAccount.passwordHash="$ADMIN_PASSWORD_HASH" \
            --set api.adminAccount.tokenSigningKey="$SIGNING_KEY" \
            --wait
      - name: Verify Kargo
        run: kubectl get pods -n kargo
      # -----------------------------
      # Install Kargo CLI
      # -----------------------------
      - name: Install Kargo CLI
        run: |
          curl -Lo /usr/local/bin/kargo https://github.com/akuity/kargo/releases/latest/download/kargo-linux-amd64
          chmod +x /usr/local/bin/kargo
          kargo version
      # -----------------------------
      # Setup Kargo Project & Stages
      # -----------------------------
      - name: Create Kargo Project
        run: |
          kubectl apply -f - <<EOF
          apiVersion: kargo.akuity.io/v1alpha1
          kind: Project
          metadata:
            name: kargo-demo
          EOF
      - name: Create stage namespaces
        run: |
          kubectl create namespace dev || true
          kubectl create namespace staging || true
          kubectl create namespace prod || true
      - name: Deploy sample app to all stages
        run: |
          for NS in dev staging prod; do
            kubectl create deployment guestbook \
              --image=ghcr.io/akuity/guestbook:latest \
              --namespace=$NS || true
            kubectl expose deployment guestbook \
              --port=80 --target-port=8080 \
              --namespace=$NS || true
          done
      - name: Create Kargo Warehouse
        run: |
          kubectl apply -f - <<EOF
          apiVersion: kargo.akuity.io/v1alpha1
          kind: Warehouse
          metadata:
            name: kargo-demo
            namespace: kargo-demo
          spec:
            subscriptions:
            - image:
                repoURL: ghcr.io/akuity/guestbook
                semverConstraint: ^0.1.0
          EOF
      - name: Create Kargo Stages
        run: |
          kubectl apply -f - <<EOF
          apiVersion: kargo.akuity.io/v1alpha1
          kind: Stage
          metadata:
            name: dev
            namespace: kargo-demo
          spec:
            requestedFreight:
            - origin:
                kind: Warehouse
                name: kargo-demo
              sources:
                direct: true
            promotionTemplate:
              spec:
                steps:
                - uses: kustomize-set-image
                  config:
                    images:
                    - image: ghcr.io/akuity/guestbook
                - uses: kustomize-build
                  config:
                    path: ./
                - uses: kubectl-apply
                  config:
                    namespace: dev
          ---
          apiVersion: kargo.akuity.io/v1alpha1
          kind: Stage
          metadata:
            name: staging
            namespace: kargo-demo
          spec:
            requestedFreight:
            - origin:
                kind: Warehouse
                name: kargo-demo
              sources:
                stages:
                - dev
            promotionTemplate:
              spec:
                steps:
                - uses: kustomize-set-image
                  config:
                    images:
                    - image: ghcr.io/akuity/guestbook
                - uses: kustomize-build
                  config:
                    path: ./
                - uses: kubectl-apply
                  config:
                    namespace: staging
          ---
          apiVersion: kargo.akuity.io/v1alpha1
          kind: Stage
          metadata:
            name: prod
            namespace: kargo-demo
          spec:
            requestedFreight:
            - origin:
                kind: Warehouse
                name: kargo-demo
              sources:
                stages:
                - staging
            promotionTemplate:
              spec:
                steps:
                - uses: kustomize-set-image
                  config:
                    images:
                    - image: ghcr.io/akuity/guestbook
                - uses: kustomize-build
                  config:
                    path: ./
                - uses: kubectl-apply
                  config:
                    namespace: prod
          EOF
      # -----------------------------
      # Verify everything
      # -----------------------------
      - name: Verify Kargo resources
        run: |
          kubectl get projects -A
          kubectl get warehouses -n kargo-demo
          kubectl get stages -n kargo-demo
          kubectl get freight -n kargo-demo
      # -----------------------------
      # Final check
      # -----------------------------
      - name: Show all resources
        run: kubectl get all -A
